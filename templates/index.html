<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rayfall Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #171c3a;
      color: rgb(226, 220, 220);
    }

    h1, h2, h3, label, p {
      color: rgb(226, 220, 220);
    }

    .header-container {
      display: flex;
      background-color: #171c3a;
      padding: 10px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 220px;
    }

    .logo-section img {
      height: 75px;
      margin-right: 10px;
    }

    .logo-section h1 {
      margin: 0;
      font-size: 2rem;
    }

    .controls-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 20px;
    }

    .control-row, .filter-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .control-row input[type="date"],
    .control-row button,
    .control-row select {
      background-color: #2c2f5e;
      color: rgb(226, 220, 220);
      border: 1px solid #444;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .control-row button,
    .control-row select {
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .control-row button:hover,
    .control-row select:hover {
      background-color: #3a4177;
    }

    .lines-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .compact-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .color-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    #map {
      height: calc(100vh - 160px);
      width: 100%;
    }

    .leaflet-control {
      background-color: #1e234d !important;
      color: rgb(226, 220, 220) !important;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header-container">
    <div class="logo-section">
      <img src="/static/rayfall.png" alt="Rayfall Logo" />
      <h1>Rayfall</h1>
    </div>
    <div class="controls-section">
      <div class="control-row">
        <label for="start">Start:</label>
        <input type="date" id="start" />
        <label for="end">End:</label>
        <input type="date" id="end" />
        <button onclick="loadQSOs()">Load QSOs</button>
        <label class="lines-toggle">
          <input type="checkbox" id="showLines" onchange="toggleLines()" /> Show Lines
        </label>
        <label>
          <input type="checkbox" id="colorByBand" checked onchange="filterQSOs()" /> Color by Band
        </label>
        <label>
          <select id="basemapSelector" onchange="switchBaseMap(this.value)">
            <option value="light">Light</option>
            <option value="dark" selected>Dark</option>
            <option value="topo">Topographic</option>
            <option value="satellite">Satellite</option>
            <option value="streets">Streets</option>
          </select>
        </label>
        <label class="lines-toggle">
          <input type="checkbox" id="showGridSquares" onchange="toggleGridSquares()" /> Show Grid Squares
        </label>
        <label>
          <select id="gridPrecision" onchange="updateGridPrecision()">
            <option value="4">4-char grids</option>
            <option value="6" selected>6-char grids</option>
          </select>
        </label>
        <label class="lines-toggle">
          <input type="checkbox" id="showPins" checked onchange="togglePins()" /> Show Pins
        </label>
        <label class="lines-toggle">
          <input type="checkbox" id="showQTH" checked onchange="toggleQTH()" /> Show QTH
        </label>
        <button onclick="exportMap()">Export Map (300 DPI)</button>
      </div>
      <div class="filter-row">
        <div><strong>QSOs shown: <span id="qsoCount">0</span></strong></div>
        <div><strong>Bands:</strong></div>
        <div id="bandFilters" class="compact-filters"></div>
        <div><strong>Modes:</strong></div>
        <div id="modeFilters" class="compact-filters"></div>
      </div>
    </div>
  </div>

  <div id="apiModal" style="display:none; position:fixed; top:30%; left:50%; transform:translate(-50%,-50%);
    background:#1e234d; padding:20px; border-radius:8px; box-shadow:0 0 10px #000; z-index:1000;">
    <label for="apiKeyInput">Enter QRZ API Key:</label><br>
    <input type="text" id="apiKeyInput" style="width:100%; margin:10px 0;"><br>
    <button onclick="saveApiKey()">Save</button>
    <button onclick="closeApiModal()">Cancel</button>
    </div>
    <div style="position:absolute; top:10px; right:10px;">
    <button onclick="openApiModal()">Change API Key</button>
  </div>


  <div id="map"></div>

  <div style="text-align:center; color:grey; margin-top:8px; font-size:14px;">
  Created by N2CLW
  </div>

  <div style="text-align: center; color: grey; font-size: 14px; margin-top: 6px;">
  <a href="https://github.com/moose25/rayfall" target="_blank" style="color: grey; text-decoration: none;">
    View on GitHub
  </a>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    let map = L.map('map').setView([39.0374, -77.408967], 4);
    let markers = [];
    let lines = [];
    let gridSquares = [];
    let workedGrids = new Set();
    let currentQSOs = [];
    let bandColors = {
        "6m": "#FA0F0F",
        "10m": "#FF4C4C",
        "15m": "#D2B48C",
        "17m": "#FFFF99",
        "20m": "#FFC300",
        "30m": "#00CC66",
        "40m": "#3399FF",
        "80m": "#800080",
        "160m": "#6AFF4C"
    };

    let baseLayers = {
        light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 19
        }),
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 19
        }),
        topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data: &copy; <a href="https://opentopomap.org">OpenTopoMap</a>',
            maxZoom: 17
        }),
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; <a href="https://www.esri.com/">Esri</a> &mdash; Source: Esri, i-cubed, USDA, USGS',
            maxZoom: 19
        }),
        streets: L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 20
        })
        };

    baseLayers.dark.addTo(map);

    function switchBaseMap(key) {
    Object.values(baseLayers).forEach(layer => map.removeLayer(layer));
    baseLayers[key].addTo(map);
    }

    let qthMarker = null;

    function loadQSOs() {
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    const apiKey = localStorage.getItem("qrzApiKey");

    if (!apiKey) {
        alert("Please set your QRZ API key first.");
        return;
    }

    if (!start || !end) {
        alert("Please select a start and end date.");
        return;
    }

    fetch(`/api/logs?start=${start}&end=${end}`, {
        headers: { "x-api-key": apiKey }
    })
        .then(res => res.json())
        .then(data => {
        clearMap();
        populateFilters(data.qsos);
        plotQSOs(data.qsos);
        });
    }

    function clearMap() {
    markers.forEach(m => map.removeLayer(m));
    lines.forEach(l => map.removeLayer(l));
    gridSquares.forEach(g => map.removeLayer(g));
    markers = [];
    lines = [];
    gridSquares = [];
    }

    function populateFilters(qsos) {
    currentQSOs = qsos;

    const bandSet = new Set();
    const modeSet = new Set();

    qsos.forEach(q => {
        if (q.band) bandSet.add(q.band.toLowerCase());
        if (q.mode) modeSet.add(q.mode);
    });

    const bandFilters = document.getElementById("bandFilters");
    bandFilters.innerHTML = "";
    Array.from(bandSet).sort().forEach(band => {
        const color = bandColors[band] || "#999";
        const label = document.createElement("label");
        label.innerHTML = `<span class="color-dot" style="background-color:${color}"></span>
        <input type="checkbox" checked value="${band}" onchange="filterQSOs()"> ${band}`;
        bandFilters.appendChild(label);
    });

    const modeFilters = document.getElementById("modeFilters");
    modeFilters.innerHTML = "";
    Array.from(modeSet).sort().forEach(mode => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" checked value="${mode}" onchange="filterQSOs()"> ${mode}`;
        modeFilters.appendChild(label);
    });
    }

    function openApiModal() {
    document.getElementById("apiKeyInput").value = localStorage.getItem("qrzApiKey") || "";
    document.getElementById("apiModal").style.display = "block";
    }

    function closeApiModal() {
    document.getElementById("apiModal").style.display = "none";
    }

    function saveApiKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (key) {
        localStorage.setItem("qrzApiKey", key);
        alert("API Key saved.");
    }
    closeApiModal();
    }

    function plotQSOs(qsos) {
    document.getElementById("qsoCount").textContent = qsos.length;
    placeQTHMarkerFromLogs(qsos);

    // Collect worked grid squares with selected precision
    const gridPrecision = parseInt(document.getElementById("gridPrecision").value);
    workedGrids.clear();
    qsos.forEach(qso => {
        if (qso.gridsquare) {
          // Take first 4 or 6 characters of grid square based on selection
          const grid = qso.gridsquare.substring(0, Math.min(gridPrecision, qso.gridsquare.length));
          workedGrids.add(grid);
        }
    });

    // Draw grid squares if enabled
    drawGridSquares();

    // Only show pins if checkbox is checked
    const showPins = document.getElementById("showPins").checked;

    qsos.forEach(qso => {
        if (!qso.lat || !qso.lon) return;

        const useBandColor = document.getElementById("colorByBand").checked;
        const band = (qso.band || "").toLowerCase();
        const markerColor = useBandColor ? (bandColors[band] || "#3399FF") : "#3399FF";

        const svgIcon = L.divIcon({
        className: "",
        html: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
            <path d="M12 0C5.4 0 0 5.4 0 12c0 7.5 12 24 12 24s12-16.5 12-24C24 5.4 18.6 0 12 0z" fill="${markerColor}" stroke="#000" stroke-width="1"/>
            <circle cx="12" cy="12" r="5" fill="#fff"/></svg>`,
        iconSize: [24, 36],
        iconAnchor: [12, 36],
        popupAnchor: [0, -36]
        });

        const popupHtml = `
        <div style="line-height: 1.5;">
            <b>Call:</b> ${qso.call}<br>
            <b>Band:</b> ${qso.band}<br>
            <b>Mode:</b> ${qso.mode}<br>
            <b>Date:</b> ${qso.qso_date}<br>
            <b>Time:</b> ${qso.time_on}<br>
            ${qso.gridsquare ? `<b>Grid:</b> ${qso.gridsquare}<br>` : ''}
            ${qso.state ? `<b>State:</b> ${qso.state}<br>` : ''}
            ${qso.country ? `<b>Country:</b> ${qso.country}<br>` : ''}
            ${qso.distance ? `<b>Distance:</b> ${qso.distance} mi` : ''}
        </div>`;

        const marker = L.marker([qso.lat, qso.lon], { icon: svgIcon })
        .bindPopup(popupHtml);

        marker.qso = qso;
        
        // Only add marker to map if pins are visible
        if (showPins) {
          marker.addTo(map);
        }
        markers.push(marker);

        if (document.getElementById("showLines").checked && qso.lat && qso.lon) {
        const outline = L.polyline(
            [[qso.my_lat, qso.my_lon], [qso.lat, qso.lon]],
            { color: "grey", weight: 2, opacity: 1 }
        ).addTo(map);
        lines.push(outline);
        }
    });
    }

    function placeQTHMarkerFromLogs(qsos) {
    const showQTH = document.getElementById("showQTH").checked;
    
    // Remove existing QTH marker if present
    if (qthMarker) {
      map.removeLayer(qthMarker);
      qthMarker = null;
    }
    
    // Only place QTH marker if checkbox is checked
    if (!showQTH) return;
    
    const firstValid = qsos.find(qso => qso.my_lat && qso.my_lon);
    if (firstValid) {
        qthMarker = L.marker([firstValid.my_lat, firstValid.my_lon], {
        icon: L.divIcon({
            className: 'custom-qth-icon',
            html: '<div style="font-size: 32px; text-shadow: 1px 1px 4px black;">⚡</div>',
            iconSize: [24, 24],
            iconAnchor: [16, 16]
        }),
        zIndexOffset: 1000
        }).addTo(map);
    }
    }

    function filterQSOs() {
    const selectedBands = Array.from(document.querySelectorAll("#bandFilters input:checked")).map(cb => cb.value.toLowerCase());
    const selectedModes = Array.from(document.querySelectorAll("#modeFilters input:checked")).map(cb => cb.value);
    const filtered = currentQSOs.filter(q =>
        selectedBands.includes((q.band || "").toLowerCase()) &&
        selectedModes.includes(q.mode)
    );
    document.getElementById("qsoCount").textContent = filtered.length;
    clearMap();
    plotQSOs(filtered);
    }

    function toggleLines() {
    filterQSOs();
    }

    // Grid Square Functions
    function maidenheadToLatLon(grid) {
      // Convert Maidenhead grid square to lat/lon bounds
      grid = grid.toUpperCase();
      if (grid.length < 4) return null;
      
      const lon = (grid.charCodeAt(0) - 65) * 20 - 180;
      const lat = (grid.charCodeAt(1) - 65) * 10 - 90;
      const lon2 = parseInt(grid[2]) * 2;
      const lat2 = parseInt(grid[3]) * 1;
      
      let lonMin = lon + lon2;
      let latMin = lat + lat2;
      let lonMax = lonMin + 2;
      let latMax = latMin + 1;
      
      // If 6-character grid (subsquare)
      if (grid.length >= 6) {
        const lon3 = (grid.charCodeAt(4) - 65) * (2/24);
        const lat3 = (grid.charCodeAt(5) - 65) * (1/24);
        lonMin += lon3;
        latMin += lat3;
        lonMax = lonMin + (2/24);
        latMax = latMin + (1/24);
      }
      
      return {
        latMin, latMax, lonMin, lonMax,
        center: [(latMin + latMax) / 2, (lonMin + lonMax) / 2]
      };
    }

    function drawGridSquares() {
      // Clear existing grid squares
      gridSquares.forEach(g => map.removeLayer(g));
      gridSquares = [];
      
      if (!document.getElementById("showGridSquares").checked) return;
      
      workedGrids.forEach(grid => {
        const bounds = maidenheadToLatLon(grid);
        if (!bounds) return;
        
        const rectangle = L.rectangle(
          [[bounds.latMin, bounds.lonMin], [bounds.latMax, bounds.lonMax]],
          {
            color: '#FFD700',
            weight: 2,
            fillColor: '#FFD700',
            fillOpacity: 0.2
          }
        ).addTo(map);
        
        // Add grid label
        const label = L.marker(bounds.center, {
          icon: L.divIcon({
            className: 'grid-label',
            html: `<div style="background: rgba(0,0,0,0.7); color: #FFD700; padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 11px; white-space: nowrap;">${grid}</div>`,
            iconSize: [0, 0]
          })
        }).addTo(map);
        
        gridSquares.push(rectangle);
        gridSquares.push(label);
      });
    }

    function toggleGridSquares() {
      drawGridSquares();
    }

    function togglePins() {
      filterQSOs();
    }

    function toggleQTH() {
      // Re-plot to show/hide QTH marker
      if (currentQSOs.length > 0) {
        placeQTHMarkerFromLogs(currentQSOs);
      }
    }

    function updateGridPrecision() {
      // Redraw grid squares with new precision
      if (currentQSOs.length > 0) {
        filterQSOs();
      }
    }

    // Export Map Function
    function exportMap() {
      const mapElement = document.getElementById('map');
      const exportButton = event.target;
      exportButton.disabled = true;
      exportButton.textContent = 'Exporting...';
      
      // Calculate dimensions for 300 DPI
      // Standard print size: 8.5 x 11 inches at 300 DPI = 2550 x 3300 pixels
      const printWidth = 3300;
      const printHeight = 2550;
      
      // Save current size
      const originalWidth = mapElement.style.width;
      const originalHeight = mapElement.style.height;
      
      // Temporarily resize for high-res capture
      mapElement.style.width = printWidth + 'px';
      mapElement.style.height = printHeight + 'px';
      map.invalidateSize();
      
      setTimeout(() => {
        html2canvas(mapElement, {
          useCORS: true,
          allowTaint: true,
          scale: 1,
          width: printWidth,
          height: printHeight,
          backgroundColor: '#171c3a'
        }).then(canvas => {
          // Convert to blob and download
          canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().split('T')[0];
            link.download = `rayfall-map-${timestamp}-300dpi.jpg`;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
            
            // Restore original size
            mapElement.style.width = originalWidth;
            mapElement.style.height = originalHeight;
            map.invalidateSize();
            
            exportButton.disabled = false;
            exportButton.textContent = 'Export Map (300 DPI)';
          }, 'image/jpeg', 0.95);
        }).catch(err => {
          console.error('Export failed:', err);
          alert('Export failed. Please try again.');
          
          // Restore original size
          mapElement.style.width = originalWidth;
          mapElement.style.height = originalHeight;
          map.invalidateSize();
          
          exportButton.disabled = false;
          exportButton.textContent = 'Export Map (300 DPI)';
        });
      }, 500);
    }

  </script>
</body>
</html>
